name: Weekly public ATS tenant discovery

on:
  schedule:
    - cron: "23 17 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: weekly-public-ats-tenant-discovery
  cancel-in-progress: false

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.20.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Download the current official JPX listed-company workbook
        run: |
          set -euo pipefail
          page="$(curl --fail --silent --show-error --location https://www.jpx.co.jp/english/markets/statistics-equities/misc/01.html)"
          relative="$(printf '%s' "$page" | sed -n 's/.*href="\([^"]*data_e\.xls\)".*/\1/p' | head -1)"
          test -n "$relative"
          curl --fail --silent --show-error --location "https://www.jpx.co.jp$relative" --output /tmp/jpx-listed-companies.xls
      - name: Convert JPX workbook into a non-executable ranking signal
        run: |
          if ! command -v libreoffice >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends libreoffice-calc
          fi
          mkdir -p tmp/jpx
          libreoffice --headless --convert-to csv --outdir tmp/jpx /tmp/jpx-listed-companies.xls
          test -s tmp/jpx/jpx-listed-companies.csv
      - name: Harvest tenants within a 300-request ceiling
        run: pnpm source:harvest-tenants --jpx-csv tmp/jpx/jpx-listed-companies.csv
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_SEARCH_REQUEST_BUDGET: "300"
          GITHUB_SEARCH_PAGES_PER_QUERY: "10"
          GITHUB_SEARCH_INTERVAL_MS: "10000"
          GITHUB_HARVEST_TIMEOUT_MS: "3600000"
      - uses: actions/upload-artifact@v4
        with:
          name: source-tenant-candidates-${{ github.run_id }}
          path: |
            tmp/source-tenant-candidates.json
            tmp/source-tenant-candidates.md
            tmp/jpx/jpx-listed-companies.csv
          retention-days: 30
          if-no-files-found: error
      - name: Open or update the discovery summary issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const title = "Weekly public ATS tenant discovery";
            const summary = fs.readFileSync("tmp/source-tenant-candidates.md", "utf8");
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `${summary}\nRun artifact: ${runUrl}\n`;
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100,
            });
            const existing = issues.find((issue) => issue.pull_request === undefined && issue.title === title);
            if (existing === undefined) {
              await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            }
