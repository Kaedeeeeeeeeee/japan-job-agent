name: Nightly live source audit

on:
  schedule:
    - cron: "17 18 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  greenhouse:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.20.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm live:audit
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: greenhouse-live-audit
          path: tmp/live-greenhouse-audit.json
          retention-days: 30

