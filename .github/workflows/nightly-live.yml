name: Nightly live source audit

on:
  schedule:
    - cron: "17 18 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  greenhouse:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.20.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm live:audit
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: greenhouse-live-audit
          path: |
            tmp/live-greenhouse-audit.json
            tmp/live-schema-org-audit.json
          retention-days: 30

  private-linux-health:
    if: ${{ vars.JJA_ENABLE_TAILSCALE_HEALTH == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Join the private tailnet with an ephemeral tagged node
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
      - name: Check Linux API readiness over Tailscale
        run: curl --fail --show-error --silent --max-time 20 "$JJA_HEALTH_URL"
        env:
          JJA_HEALTH_URL: ${{ secrets.JJA_TAILSCALE_HEALTH_URL }}

  notify-failure:
    needs: [greenhouse, private-linux-health]
    if: ${{ always() && (needs.greenhouse.result == 'failure' || needs.private-linux-health.result == 'failure') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Open or update the nightly health incident
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Nightly live health failed";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `Nightly source/API health failed on ${new Date().toISOString()}.`,
              `- source audit: ${{ needs.greenhouse.result }}`,
              `- private Linux health: ${{ needs.private-linux-health.result }}`,
              `- run: ${runUrl}`,
            ].join("\n");
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100,
            });
            const existing = issues.find((issue) => issue.pull_request === undefined && issue.title === title);
            if (existing === undefined) {
              await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            }
