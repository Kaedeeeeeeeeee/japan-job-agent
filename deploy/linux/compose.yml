name: japan-job-agent

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-japan_job_agent}
    volumes:
      - ${JJA_DATA_ROOT:-/srv/japan-job-agent}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-japan_job_agent}"]
      interval: 10s
      timeout: 5s
      retries: 12
    shm_size: 1gb
    mem_limit: 4g
    cpus: 2.0

  temporal:
    image: temporalio/auto-setup:1.29.7
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PWD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 15s
      timeout: 10s
      retries: 20
    mem_limit: 2g
    cpus: 1.5

  migrate:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.worker
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-japan_job_agent}
    command: ["pnpm", "db:migrate"]

  api:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.api
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      DEPLOYMENT_TARGET: linux
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-japan_job_agent}
      API_INTERNAL_TOKEN: ${API_INTERNAL_TOKEN:?set API_INTERNAL_TOKEN}
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      TEMPORAL_TASK_QUEUE: japan-job-agent
    ports:
      - "${TAILSCALE_BIND_IP:-127.0.0.1}:${API_PORT:-3001}:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
    mem_limit: 1g
    cpus: 1.0

  worker:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.worker
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      temporal:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DEPLOYMENT_TARGET: linux
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-japan_job_agent}
      RAW_STORAGE_PATH: /data/raw
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      TEMPORAL_TASK_QUEUE: japan-job-agent
    volumes:
      - ${JJA_DATA_ROOT:-/srv/japan-job-agent}/raw:/data/raw
      - ${JJA_DATA_ROOT:-/srv/japan-job-agent}/backups:/data/backups
    mem_limit: 3g
    cpus: 2.0

  schedules:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.worker
    restart: "no"
    depends_on:
      migrate:
        condition: service_completed_successfully
      temporal:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DEPLOYMENT_TARGET: linux
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-japan_job_agent}
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      TEMPORAL_TASK_QUEUE: japan-job-agent
    command: ["pnpm", "temporal:schedules"]
    mem_limit: 512m
    cpus: 0.5

  web:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DEPLOYMENT_TARGET: linux
      PORT: 3000
      API_BASE_URL: http://api:3000
      API_INTERNAL_TOKEN: ${API_INTERNAL_TOKEN:?set API_INTERNAL_TOKEN}
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET}
      AUTH_GITHUB_ID: ${AUTH_GITHUB_ID:?set AUTH_GITHUB_ID}
      AUTH_GITHUB_SECRET: ${AUTH_GITHUB_SECRET:?set AUTH_GITHUB_SECRET}
      ALLOWED_GITHUB_LOGIN: Kaedeeeeeeeeee
      AUTH_URL: ${AUTH_URL:?set AUTH_URL to the Tailscale HTTPS URL}
    ports:
      - "${TAILSCALE_BIND_IP:-127.0.0.1}:${WEB_PORT:-3000}:3000"
    mem_limit: 1g
    cpus: 1.0

  backup:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.worker
    profiles: ["maintenance"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-japan_job_agent}
      DEPLOYMENT_TARGET: linux
      BACKUP_OUTPUT_PATH: /data/backups/japan-job-agent.dump
    volumes:
      - ${JJA_DATA_ROOT:-/srv/japan-job-agent}/backups:/data/backups
    command: ["pnpm", "backup:database"]
